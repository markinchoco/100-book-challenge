<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Book Challenge - Reading Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: Chicago, Monaco, "Courier New", monospace; 
  background: #e0e0e0; 
  color: black;
  padding: 20px;
  font-size: 12px;
}
.window {
  border: 2px solid black;
  background: white;
  max-width: 600px;
  margin: 0 auto;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
}
.title-bar {
  background: white;
  border-bottom: 1px solid black;
  padding: 2px 4px;
  display: flex;
  align-items: center;
  gap: 4px;
  height: 20px;
}
.title-bar-stripes {
  flex: 1;
  height: 100%;
  background: repeating-linear-gradient(
    90deg,
    black 0px,
    black 1px,
    white 1px,
    white 2px
  );
}
.close-box {
  width: 12px;
  height: 12px;
  border: 1px solid black;
  background: white;
}
.content {
  padding: 12px;
  background: white;
}
.form-group {
  margin-bottom: 8px;
}
label {
  display: block;
  margin-bottom: 2px;
  font-size: 11px;
}
input[type="text"], input[type="date"] {
  width: 100%;
  border: 1px solid black;
  padding: 2px 4px;
  font-family: Chicago, Monaco, "Courier New", monospace;
  font-size: 12px;
  background: white;
}
.radio-group {
  display: flex;
  gap: 16px;
  margin-top: 4px;
}
.radio-label {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
}
input[type="radio"] {
  margin: 0;
}
.button {
  border: 2px solid black;
  background: white;
  padding: 4px 16px;
  font-family: Chicago, Monaco, "Courier New", monospace;
  font-size: 12px;
  cursor: pointer;
  margin-top: 12px;
  display: inline-block;
}
.button:active {
  background: black;
  color: white;
}
.log {
  margin-top: 16px;
  border-top: 1px solid black;
  padding-top: 12px;
}
.log-entry {
  border: 1px solid black;
  padding: 6px;
  margin-bottom: 8px;
  background: white;
  font-size: 11px;
  line-height: 1.4;
}
.log-header {
  font-weight: bold;
  margin-bottom: 2px;
}
.log-meta {
  font-size: 10px;
}
.stats {
  border: 1px solid black;
  padding: 8px;
  margin-bottom: 12px;
  background: white;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  margin-bottom: 2px;
}
.delete-btn {
  border: 1px solid black;
  background: white;
  width: 18px;
  height: 18px;
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
}
.delete-btn:active {
  background: black;
  color: white;
}
</style>
</head>
<body>

<div class="window">
  <div class="title-bar">
    <div class="close-box"></div>
    <div class="title-bar-stripes"></div>
  </div>
  
  <div class="content">
    <div style="text-align: center; margin-bottom: 16px; font-size: 14px; font-weight: bold;">
      100 Book Challenge
    </div>
    
    <div class="stats" id="stats">
      <div class="stat-row">
        <span>Books logged:</span>
        <span id="bookCount">0 / 100</span>
      </div>
      <div class="stat-row">
        <span>Total time:</span>
        <span id="totalTime">0 min</span>
      </div>
    </div>
    
    <div class="form-group">
      <label>Author:</label>
      <input type="text" id="author" />
    </div>
    
    <div class="form-group">
      <label>Work:</label>
      <input type="text" id="work" />
    </div>
    
    <div class="form-group">
      <label>Date:</label>
      <input type="date" id="date" />
    </div>
    
    <div class="form-group">
      <label>Reading time:</label>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="duration" value="15" checked />
          <span>15 min</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="duration" value="30" />
          <span>30 min</span>
        </label>
      </div>
    </div>
    
    <button class="button" onclick="addEntry()">Add Entry</button>
    <button class="button" onclick="syncWithGitHub()">Sync</button>
    <button class="button" onclick="exportData()">Export</button>
    <button class="button" onclick="document.getElementById('importFile').click()">Import</button>
    <button class="button" onclick="showSettings()">Settings</button>
    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)" />
    
    <div class="log" id="log"></div>
  </div>
</div>

<div id="settingsModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
  <div class="window" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); max-width: 500px;">
    <div class="title-bar">
      <div class="close-box" onclick="hideSettings()"></div>
      <div class="title-bar-stripes"></div>
    </div>
    <div class="content">
      <div style="text-align: center; margin-bottom: 16px; font-size: 14px; font-weight: bold;">
        GitHub Sync Settings
      </div>
      <div class="form-group">
        <label>GitHub Token:</label>
        <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx" />
        <div style="font-size: 10px; margin-top: 4px; color: #666;">
          Create at: github.com/settings/tokens (needs 'repo' scope)
        </div>
      </div>
      <div class="form-group">
        <label>Repository:</label>
        <input type="text" id="githubRepo" value="markinchoco/100-book-challenge" />
      </div>
      <div class="form-group">
        <label>File name:</label>
        <input type="text" id="githubFile" value="reading-data.json" />
      </div>
      <button class="button" onclick="saveSettings()">Save Settings</button>
      <button class="button" onclick="hideSettings()">Cancel</button>
    </div>
  </div>
</div>

<script>
let entries = [];

function loadEntries() {
  const stored = localStorage.getItem('reading_log_entries');
  if (stored) {
    try {
      entries = JSON.parse(stored);
      renderLog();
      updateStats();
    } catch (e) {
      console.error('Failed to load entries:', e);
    }
  }
}

function saveEntries() {
  localStorage.setItem('reading_log_entries', JSON.stringify(entries));
}

function addEntry() {
  const author = document.getElementById('author').value.trim();
  const work = document.getElementById('work').value.trim();
  const date = document.getElementById('date').value;
  const duration = document.querySelector('input[name="duration"]:checked').value;
  
  if (!author || !work || !date) {
    alert('Please fill in all fields');
    return;
  }
  
  entries.unshift({
    author,
    work,
    date,
    duration: parseInt(duration)
  });
  
  saveEntries();
  renderLog();
  updateStats();
  
  document.getElementById('author').value = '';
  document.getElementById('work').value = '';
  document.getElementById('date').value = '';
}

function renderLog() {
  const log = document.getElementById('log');
  
  if (entries.length === 0) {
    log.innerHTML = '<div style="text-align: center; font-size: 11px; padding: 16px;">No entries yet</div>';
    return;
  }
  
  log.innerHTML = entries.map((entry, index) => `
    <div class="log-entry">
      <div style="display: flex; justify-content: space-between; align-items: start;">
        <div style="flex: 1;">
          <div class="log-header">${entry.work}</div>
          <div>by ${entry.author}</div>
          <div class="log-meta">${entry.date} • ${entry.duration} minutes</div>
        </div>
        <button class="delete-btn" onclick="deleteEntry(${index})">✕</button>
      </div>
    </div>
  `).join('');
}

function deleteEntry(index) {
  if (confirm('Delete this entry?')) {
    entries.splice(index, 1);
    saveEntries();
    renderLog();
    updateStats();
  }
}

function showSettings() {
  const token = localStorage.getItem('github_token') || '';
  const repo = localStorage.getItem('github_repo') || 'markinchoco/100-book-challenge';
  const file = localStorage.getItem('github_file') || 'reading-data.json';
  
  document.getElementById('githubToken').value = token;
  document.getElementById('githubRepo').value = repo;
  document.getElementById('githubFile').value = file;
  document.getElementById('settingsModal').style.display = 'block';
}

function hideSettings() {
  document.getElementById('settingsModal').style.display = 'none';
}

function saveSettings() {
  const token = document.getElementById('githubToken').value.trim();
  const repo = document.getElementById('githubRepo').value.trim();
  const file = document.getElementById('githubFile').value.trim();
  
  if (!token || !repo || !file) {
    alert('All fields are required');
    return;
  }
  
  localStorage.setItem('github_token', token);
  localStorage.setItem('github_repo', repo);
  localStorage.setItem('github_file', file);
  
  alert('Settings saved!');
  hideSettings();
}

async function syncWithGitHub() {
  const token = localStorage.getItem('github_token');
  const repo = localStorage.getItem('github_repo');
  const file = localStorage.getItem('github_file');
  
  if (!token || !repo || !file) {
    alert('Please configure GitHub settings first');
    showSettings();
    return;
  }
  
  try {
    // First, try to get existing file to check for updates
    const getResponse = await fetch(`https://api.github.com/repos/${repo}/contents/${file}`, {
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json'
      }
    });
    
    let sha = null;
    if (getResponse.ok) {
      const data = await getResponse.json();
      sha = data.sha;
      
      // Decode and merge remote data
      const remoteContent = atob(data.content);
      const remoteEntries = JSON.parse(remoteContent);
      
      // Simple merge: combine and deduplicate
      const merged = [...entries];
      remoteEntries.forEach(remoteEntry => {
        const exists = merged.some(e => 
          e.author === remoteEntry.author && 
          e.work === remoteEntry.work && 
          e.date === remoteEntry.date
        );
        if (!exists) {
          merged.push(remoteEntry);
        }
      });
      
      // Sort by date descending
      merged.sort((a, b) => new Date(b.date) - new Date(a.date));
      entries = merged;
    }
    
    // Upload current entries
    const content = btoa(JSON.stringify(entries, null, 2));
    const putResponse = await fetch(`https://api.github.com/repos/${repo}/contents/${file}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'Update reading log',
        content: content,
        sha: sha
      })
    });
    
    if (putResponse.ok) {
      saveEntries();
      renderLog();
      updateStats();
      alert('Synced successfully!');
    } else {
      const error = await putResponse.json();
      alert('Sync failed: ' + (error.message || 'Unknown error'));
    }
  } catch (err) {
    alert('Sync error: ' + err.message);
  }
}

function updateStats() {
  const totalMinutes = entries.reduce((sum, e) => sum + e.duration, 0);
  document.getElementById('bookCount').textContent = `${entries.length} / 100`;
  document.getElementById('totalTime').textContent = `${totalMinutes} min`;
}

function exportData() {
  const dataStr = JSON.stringify(entries, null, 2);
  const dataBlob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(dataBlob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'reading-log-' + new Date().toISOString().split('T')[0] + '.json';
  link.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (Array.isArray(imported)) {
        if (confirm(`Import ${imported.length} entries? This will replace your current log.`)) {
          entries = imported;
          saveEntries();
          renderLog();
          updateStats();
          alert('Import successful!');
        }
      } else {
        alert('Invalid file format');
      }
    } catch (err) {
      alert('Error reading file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

document.getElementById('date').valueAsDate = new Date();

loadEntries();
</script>

</body>
</html>
